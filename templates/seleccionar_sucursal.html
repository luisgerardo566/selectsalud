<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar Sucursal - Select Salud</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { 
            background-color: #2c3e50; 
            color: white; 
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .container {
            max-width: 900px;
        }
        h1 {
            color: #3498db;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .mode-badge {
            font-size: 1.2rem;
            background-color: #e67e22;
            padding: 5px 20px;
            border-radius: 20px;
            margin-bottom: 40px;
            display: inline-block;
        }
        .btn-sucursal { 
            background: white; 
            color: #2c3e50; 
            border-radius: 15px; 
            padding: 30px 20px; 
            text-decoration: none; 
            display: block; 
            transition: all 0.3s ease; 
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            border: 3px solid transparent;
            height: 100%;
        }
        .btn-sucursal:hover { 
            transform: translateY(-8px); 
            background: #3498db; 
            color: white; 
            border-color: #fff;
        }
        .btn-sucursal span {
            display: block;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .btn-general {
            border: 3px dashed #3498db;
            background: rgba(52, 152, 219, 0.1);
            color: #3498db;
        }
        .btn-general:hover {
            background: #3498db;
            color: white;
        }
    </style>
</head>
<body class="container text-center">
    <div class="w-100">
        <h1>📍 Control de Acceso por Sede</h1>
        <div class="mode-badge">Modo: {{ modo }}</div>
        
        <p class="mb-5">Selecciona la sucursal que deseas gestionar en este momento.</p>

        <div class="row g-4 justify-content-center">
            <div class="col-md-4">
                <a href="{{ url_for('ir_a_tabla', modo=modo, sucursal='SELECT SALUD - CUCEI') }}" class="btn-sucursal">
                    <span>🏫</span>
                    CUCEI
                </a>
            </div>

            <div class="col-md-4">
                <a href="{{ url_for('ir_a_tabla', modo=modo, sucursal='SELECT SALUD - CENTRO') }}" class="btn-sucursal">
                    <span>🏛️</span>
                    GUADALAJARA<br>(CENTRO)
                </a>
            </div>

            <div class="col-md-4">
                <a href="{{ url_for('ir_a_tabla', modo=modo, sucursal='SELECT SALUD - ZAPOPAN CENTRO') }}" class="btn-sucursal">
                    <span>🏙️</span>
                    ZAPOPAN
                </a>
            </div>
        </div>

        <div class="mt-5">
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-light px-4">⬅ Volver al Menú Principal</a>
        </div>
    </div>
</body>
</html>
