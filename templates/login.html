<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Select Salud - Acceso</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            width: 360px;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            color: #3498db;
            margin-bottom: 8px;
        }
        .login-box h2 {
            color: #3498db;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .login-box .subtitle {
            color: #7f8c8d;
            font-size: 0.82rem;
            margin-bottom: 24px;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #dde3ea;
            border-radius: 8px;
            padding: 0 12px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
            background: white;
        }
        .input-wrapper:focus-within {
            border-color: #3498db;
        }
        .input-wrapper i {
            color: #aab3be;
            font-size: 16px;
            flex-shrink: 0;
        }
        .input-wrapper input {
            border: none;
            outline: none;
            padding: 11px 10px;
            font-size: 14px;
            width: 100%;
            background: transparent;
            color: #2c3e50;
        }
        .input-wrapper input::placeholder { color: #b0bec5; }
        .toggle-pass {
            background: none;
            border: none;
            color: #aab3be;
            cursor: pointer;
            padding: 0;
            font-size: 16px;
            line-height: 1;
        }
        .toggle-pass:hover { color: #3498db; }
        .btn-login {
            width: 100%;
            padding: 11px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover { background-color: #2980b9; }
        .error-msg {
            background: #fff5f5;
            border: 1px solid #f5c6c6;
            color: #c0392b;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: left;
        }
        .rate-limit-msg {
            background: #fff8e1;
            border: 1px solid #ffe082;
            color: #b7770d;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: left;
        }
        .footer-text {
            color: #a0aab4;
            font-size: 0.78rem;
            margin-top: 20px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo"><i class="bi bi-hospital"></i></div>
        <h2>Select Salud</h2>
        <p class="subtitle">Sistema de Gestión de Farmacias · CUCEI</p>

        {% if rate_limited %}
        <div class="rate-limit-msg">
            <i class="bi bi-shield-lock" style="font-size:18px; flex-shrink:0;"></i>
            <span>Demasiados intentos fallidos. Por favor espera <strong>5 minuto</strong> antes de intentar de nuevo.</span>
        </div>
        {% elif error %}
        <div class="error-msg">
            <i class="bi bi-exclamation-circle" style="font-size:18px; flex-shrink:0;"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="input-wrapper">
                <i class="bi bi-person"></i>
                <input type="text" name="username" placeholder="Usuario" required {% if rate_limited %}disabled{% endif %}>
            </div>
            <div class="input-wrapper">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" id="login_password" placeholder="Contraseña" required {% if rate_limited %}disabled{% endif %}>
                <button type="button" class="toggle-pass" onclick="togglePass()" aria-label="Mostrar contraseña">
                    <i class="bi bi-eye" id="eye-icon"></i>
                </button>
            </div>
            <button type="submit" class="btn-login" {% if rate_limited %}disabled style="opacity:0.6; cursor:not-allowed;"{% endif %}>
                <i class="bi bi-box-arrow-in-right"></i>
                Iniciar Sesión
            </button>
        </form>

        <p class="footer-text">
            <i class="bi bi-geo-alt"></i> Guadalajara, Jalisco
        </p>
    </div>

    <script>
        function togglePass() {
            const input = document.getElementById('login_password');
            const icon  = document.getElementById('eye-icon');
            const visible = input.type === 'text';
            input.type = visible ? 'password' : 'text';
            icon.className = visible ? 'bi bi-eye' : 'bi bi-eye-slash';
        }
    </script>
</body>
</html>
