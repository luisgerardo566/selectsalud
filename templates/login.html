<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Select Salud - Acceso</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 35px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 380px; /* Un poco más ancha para que respire */
            text-align: center;
        }

        /* AJUSTE DEL LOGO */
        .logo-container {
            margin-bottom: 15px;
        }

        .logo-img {
            width: 140px; /* Tamaño ideal para que no domine toda la caja */
            height: auto;
            display: block;
            margin: 0 auto;
            /* Filtro opcional para que resalte más */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .login-box h2 {
            color: #3498db;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .login-box .subtitle {
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        /* INPUTS */
        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1.5px solid #ecf0f1;
            border-radius: 10px;
            padding: 0 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .input-wrapper:focus-within {
            border-color: #3498db;
            background: white;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }

        .input-wrapper i {
            color: #95a5a6;
            font-size: 18px;
            flex-shrink: 0;
        }

        .input-wrapper input {
            border: none;
            outline: none;
            padding: 12px 12px;
            font-size: 15px;
            width: 100%;
            background: transparent;
            color: #2c3e50;
        }

        .toggle-pass {
            background: none;
            border: none;
            color: #95a5a6;
            cursor: pointer;
            padding: 5px;
            font-size: 18px;
            transition: color 0.2s;
        }

        .toggle-pass:hover { color: #3498db; }

        /* BOTÓN */
        .btn-login {
            width: 100%;
            padding: 13px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover { 
            background-color: #2980b9; 
            transform: translateY(-1px);
        }

        .btn-login:active { transform: translateY(0); }

        /* MENSAJES */
        .error-msg, .rate-limit-msg {
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }

        .error-msg { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; }
        .rate-limit-msg { background: #fffaf0; border: 1px solid #fbd38d; color: #975a16; }

        .footer-text {
            color: #bdc3c7;
            font-size: 0.8rem;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='img/selectSalud.png') }}" alt="Select Salud" class="logo-img">
        </div>
        <p class="subtitle text-uppercase fw-bold">Sistema de Gestión de Farmacias · CUCEI</p>

        {% if rate_limited %}
        <div class="rate-limit-msg">
            <i class="bi bi-shield-lock-fill"></i>
            <span>Seguridad activa. Espera <strong>5 min</strong> antes de reintentar.</span>
        </div>
        {% elif error %}
        <div class="error-msg">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="input-wrapper">
                <i class="bi bi-person-fill"></i>
                <input type="text" name="username" placeholder="Usuario" required {% if rate_limited %}disabled{% endif %} autofocus>
            </div>
            
            <div class="input-wrapper">
                <i class="bi bi-key-fill"></i>
                <input type="password" name="password" id="login_password" placeholder="Contraseña" required {% if rate_limited %}disabled{% endif %}>
                <button type="button" class="toggle-pass" onclick="togglePass()" aria-label="Mostrar contraseña">
                    <i class="bi bi-eye" id="eye-icon"></i>
                </button>
            </div>

            <button type="submit" class="btn-login" {% if rate_limited %}disabled style="opacity:0.6; cursor:not-allowed;"{% endif %}>
                <i class="bi bi-door-open-fill"></i>
                Entrar al Sistema
            </button>
        </form>

        <p class="footer-text">
            <i class="bi bi-geo-alt-fill text-danger"></i> Guadalajara, Jalisco
        </p>
    </div>

    <script>
        function togglePass() {
            const input = document.getElementById('login_password');
            const icon  = document.getElementById('eye-icon');
            const isVisible = input.type === 'text';
            input.type = isVisible ? 'password' : 'text';
            icon.className = isVisible ? 'bi bi-eye' : 'bi bi-eye-slash';
        }
    </script>
</body>
</html>
